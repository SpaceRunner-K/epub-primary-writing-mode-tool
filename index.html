<!DOCTYPE html>

<head>

  <style>
    :root,[data-theme="light"]{

      --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);

      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f
